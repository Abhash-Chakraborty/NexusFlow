services:
  nexusflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexusflow:local
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/nexusflow.db
      NEXT_PUBLIC_APP_NAME: NexusFlow
      NEXT_PUBLIC_APP_VERSION: 1.0.0
      RATE_LIMIT_REQUESTS: 60
      RATE_LIMIT_WINDOW_SECONDS: 60
    volumes:
      - nexusflow-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/automations >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  nexusflow-data:
