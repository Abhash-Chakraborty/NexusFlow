services:
  nexusflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexusflow:local
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - nexusflow-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/automations >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  nexusflow-data:
